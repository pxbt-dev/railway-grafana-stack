global:
  scrape_interval: 15s # Default scrape interval

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ADD THIS EXACT CONFIGURATION:
  - job_name: 'spring-boot-app'
    scheme: http
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['web.railway.internal:8080']

